# Colours used
#    black:   '#000000'
#    red:     '#c91b00'
#    green:   '#00c200'
#    yellow:  '#c7c400'
#    blue:    '#0225c7'
#    magenta: '#c930c7'
#    cyan:    '#00c5c7'
#    white:   '#c7c7c7'
#    grey-dark:   '#3a3a3a'
#    grey-mid:    '#555555'

set-option -g status-style bg=#3a3a3a,fg=#c7c7c7
set-option -g status-left-length "80"
set-option -g status-left "#{?client_prefix,#[fg=#3a3a3a bg=#c7c7c7] [#S] ,#[fg=#c7c7c7 bg=#3a3a3a] [#S] }"
set-option -g status-right "%Y-%m-%d | %H:%M "

# Styles for the different scenarios for the windows
set-option -g window-status-style bg=#3a3a3a,fg=#c7c7c7
set-option -g window-status-current-style bg=#c7c7c7,fg=#3a3a3a
set-option -g window-status-activity-style bg=#3a3a3a,fg=#c7c7c7
set-option -g window-status-bell-style bg=#3a3a3a,fg=#c91b00

## pane borders — hide label when only one pane
set-option -g pane-border-lines double
set-option -g pane-border-status off
set-option -g pane-border-format " #P: #{?window_zoomed_flag,[Z] ,}#{?#{@pane_label},#{@pane_label},#{pane_current_command}} "
set-option -g pane-active-border-style fg=#c7c7c7
set-option -g pane-border-style fg=#555555
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "set-window-option pane-border-status off" "set-window-option pane-border-status top"'

## pane number display
set-option -g display-panes-active-colour "#c7c7c7"
set-option -g display-panes-colour "#555555"

## clock
set-window-option -g clock-mode-colour "#c7c7c7"

## command prompt and selection
set-option -g message-style bg=#3a3a3a,fg=#c7c7c7
set-option -g message-command-style bg=#3a3a3a,fg=#c7c7c7
set-option -g mode-style bg=#3a3a3a,fg=#c7c7c7
