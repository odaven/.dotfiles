# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$jobs\
$line_break\
$character
"""

[directory]
truncate_to_repo = false
truncation_length = 99
